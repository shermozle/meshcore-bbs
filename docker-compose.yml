version: "3.8"

services:
  meshcore-bbs:
    build: .
    image: meshcore-bbs:latest
    container_name: meshcore-bbs
    restart: unless-stopped

    # For pyMC TCP companion instead of USB, set device.connection: tcp in
    # config.yaml and remove/comment the devices: mapping below. See docs/PYMC_MIGRATION.md.

    # Map the companion's stable USB-serial path into the container.
    # Find the host path with:  ls -l /dev/serial/by-id/
    # Update the LEFT side to your actual by-id path.
    # The RIGHT side (/dev/ttyUSB0) must match device.serial_path in config.yaml.
    #
    # ESP32-based devices (Heltec V3, T-Deck) — typically ttyUSB0:
    #   - "/dev/serial/by-id/usb-Silicon_Labs_CP2102N_..._-if00-port0:/dev/ttyUSB0"
    #   Also set serial_path: /dev/ttyUSB0 in config.yaml
    # nRF52840-based devices (Heltec T114, RAK4631) — typically ttyACM0:
    #   - "/dev/serial/by-id/usb-MeshCore_Companion_...-if00:/dev/ttyACM0"
    #   Also set serial_path: /dev/ttyACM0 in config.yaml (already the default)
    devices:
      - "/dev/serial/by-id/REPLACE_WITH_YOUR_DEVICE:/dev/ttyACM0"

    # `dialout` group on most Debian-family hosts. If your host uses a
    # different GID, override here.
    group_add:
      - dialout

    volumes:
      # config + DB + logs
      - ./data:/data
      # If using Unraid, swap for:
      # - /mnt/user/appdata/meshcore-bbs:/data

    ports:
      - "8080:8080"   # health
      # - "9090:9090" # metrics (uncomment if metrics.enabled: true)

    environment:
      BBS_CONFIG: /data/config.yaml
      BBS_DB: /data/bbs.db

    # Match the in-Dockerfile HEALTHCHECK in case the image was rebuilt without it.
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
