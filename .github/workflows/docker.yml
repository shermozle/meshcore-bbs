name: Build and publish Docker image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Push images for pushes to main AND pull requests opened from
      # branches in this repo (Cursor Cloud Agent dev builds). PRs from
      # forks do not have access to GITHUB_TOKEN with packages:write,
      # so they fall through to the test-only path.
      - name: Decide whether to push
        id: push
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ] \
               && [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to ghcr.io
        if: steps.push.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tagging rules:
          #   main branch  -> :latest, :sha-<short>
          #   pull request -> :pr-<number>, :dev, :sha-<short>
          # `type=ref,event=pr` already produces `pr-<number>` by default.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr
            type=raw,value=dev,enable=${{ github.event_name == 'pull_request' }}
            type=sha,prefix=sha-

      - name: Build and test
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runtime image
        if: steps.push.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
