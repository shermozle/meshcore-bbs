name: Build and publish Docker image

on:
  push:
    branches: [main]
    # Skip rebuilds when only files that have no effect on the runtime
    # image change. Anything COPYed into the Dockerfile (src/, tests/,
    # pyproject.toml, uv.lock) or the Dockerfile / workflow itself still
    # triggers a build. A PR that mixes code + docs still builds, because
    # paths-ignore only skips when *all* changed files match.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'docker-compose*.yml'
      - 'LICENSE'
      - 'deploy/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'docker-compose*.yml'
      - 'LICENSE'
      - 'deploy/**'
      - 'scripts/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and test
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runtime image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
